<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth Modal Test</title>
  <link rel="stylesheet" href="blocks/auth-modal/auth-modal.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 16px;
      flex-direction: column;
    }
    h1 { color: #333; margin-bottom: 8px; }
    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    button.demo-btn {
      padding: 10px 24px;
      background: #e07b39;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.demo-btn:hover { background: #c9611e; }
    button.demo-btn.secondary {
      background: #1a1a2e;
    }
    button.demo-btn.secondary:hover { background: #333; }
  </style>
</head>
<body>
  <h1>Auth Modal Test Page</h1>
  <div class="btn-group">
    <button class="demo-btn" onclick="AuthModal.open('signin')">Open Sign In Tab</button>
    <button class="demo-btn secondary" onclick="AuthModal.open('create')">Open Create Account Tab</button>
  </div>

  <script type="module">
    import { openModal, closeModal } from './blocks/auth-modal/auth-modal.js';
    window.AuthModal = { open: openModal, close: closeModal };
  </script>
</body>
</html>
